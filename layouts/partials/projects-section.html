<div class="bg-white w-100 pv5 ph3 ph4-l">
  <div class="mw8 center">

    <p class="f6 ttu tracked fa-blue-l mb4 mt0">Recent Work</p>

    {{ range $.Site.Data.projects }}
    <details class="project-accordion mb2">
      <summary class="f4 fw4 mid-gray pa3">
        {{ .headline }}
      </summary>
      <div class="pa3 pt0 f5 lh-copy mid-gray">
        <p class="mt3 measure-wide">{{ .detail }}</p>
      </div>
    </details>
    {{ end }}

  </div>
</div>
